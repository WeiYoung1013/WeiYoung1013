    <text x="2" y="196" fill="#6f6278" font-size="26" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="650">Computer Science @ SUSTech</text>
    <text x="2" y="236" fill="#4f435b" font-size="21" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">Building toward embodied agents and humanoid robots</text>
    <text x="2" y="266" fill="#4f435b" font-size="21" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">that connect perception, decision-making, and physical interaction.</text>

