    <text x="78" y="24" fill="#7d6f89" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">WeiYoung1013</text>
    <text x="78" y="50" fill="#281f32" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Research, robotics, and learning systems</text>

