<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">He Jiayang profile hero</title>
  <desc id="desc">Warm white and silver violet profile banner for embodied AI, humanoid robotics, multimodal learning, and robot learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefd"/>
      <stop offset="0.48" stop-color="#fff9f4"/>
      <stop offset="1" stop-color="#f5efff"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="74%" cy="49%" r="46%">
      <stop offset="0" stop-color="#b58cff" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#d8caff" stop-opacity="0.23"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="18%" cy="12%" r="46%">
      <stop offset="0" stop-color="#fff0e1" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b5a7c9" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#b5a7c9" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8d6add" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#d9c9ff"/>
      <stop offset="1" stop-color="#8b66da"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#5b4375" flood-opacity="0.16"/>
    </filter>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.7" fill="#9c83c9" opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#warmGlow)"/>
  <rect width="1280" height="420" rx="28" fill="url(#violetGlow)"/>
  <rect x="0" y="0" width="1280" height="420" rx="28" fill="url(#dots)" opacity="0.55"/>

